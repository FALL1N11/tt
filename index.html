<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 🐾</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #e0f7fa; /* ღია ცისფერი ფონი */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* რომ გულებმა ეკრანი არ გაზარდონ */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* მთავარი შეტყობინება ცენტრში */
        .main-message {
            text-align: center;
            color: #006064;
            opacity: 1;
            transition: opacity 0.5s;
        }

        /* კატის კონტეინერი */
        .cat-container {
            position: fixed;
            bottom: -20px;
            right: 50px;
            width: 150px;
            height: 150px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
            z-index: 10;
        }

        /* კატის თავი */
        .cat-head {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 90px;
            background-color: #f0f0f0; /* თეთრი კატა */
            border-radius: 50% 50% 0 0;
            border: 4px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ყურები */
        .ear {
            position: absolute;
            top: -20px;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 30px solid #f0f0f0;
            z-index: -1;
        }
        .ear.left { left: 10px; transform: rotate(-15deg); }
        .ear.right { right: 10px; transform: rotate(15deg); }

        .ear::after { /* ყურის შიდა ნაწილი */
            content: '';
            position: absolute;
            top: 5px;
            left: -10px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #ffc0cb;
        }

        /* თვალები */
        .eye {
            position: absolute;
            top: 35px;
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
        }
        .eye.left { left: 25px; }
        .eye.right { right: 25px; }

        /* ცხვირი */
        .nose {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #ffc0cb;
        }

        /* ინტერაქცია: Hover-ზე კატა იმალება */
        .cat-container:hover {
            transform: translateY(70px); /* ჩადის დაბლა */
        }

        /* როდესაც კატას დააწკაპუნებენ */
        .cat-container:active {
            transform: translateY(10px) scale(0.9);
        }

        /* გულების სტილი */
        .heart {
            position: fixed;
            font-size: 40px;
            color: #e91e63;
            user-select: none;
            pointer-events: none;
            animation: fly 2s linear forwards;
            opacity: 0;
            z-index: 5;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* დაფარული მესიჯი */
        #hidden-message {
            display: none;
            color: #d81b60;
            font-size: 2em;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

    <div class="main-message" id="instruction">
        <h1>აქ ვიღაც იმალება... 👀</h1>
        <p>(მოძებნე ქვედა მარჯვენა კუთხეში)</p>
    </div>

    <div id="hidden-message">
        <h1>დაგიჭირე! ❤️</h1>
        <p>შენ საუკეთესო ხარ ანნა!</p>
    </div>

    <div class="cat-container" id="cat" onclick="showMessage()">
        <div class="cat-head">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="nose"></div>
        </div>
    </div>

    <script>
        function showMessage() {
            // ვმალავთ ინსტრუქციას და კატას
            document.getElementById('instruction').style.display = 'none';
            document.getElementById('cat').style.display = 'none';
            
            // ვაჩვენებთ საიდუმლო მესიჯს
            const hiddenMsg = document.getElementById('hidden-message');
            hiddenMsg.style.display = 'block';

            // ვაჩენთ ბევრ გულს
            for (let i = 0; i < 30; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            
            // შემთხვევითი პოზიცია ცენტრის გარშემო
            heart.style.left = '50%';
            heart.style.top = '50%';
            
            // შემთხვევითი მიმართულება გაფრენისთვის
            const dx = (Math.random() - 0.5) * 400 + 'px';
            const dy = (Math.random() - 0.5) * 400 + 'px';
            heart.style.setProperty('--dx', dx);
            heart.style.setProperty('--dy', dy);
            
            // შემთხვევითი ზომა და ანიმაციის დრო
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 1 + 1) + 's';

            document.body.appendChild(heart);

            // წავშალოთ ელემენტი ანიმაციის შემდეგ
            setTimeout(() => {
                heart.remove();
            }, 2000);
        }
    </script>
</body>
</html>
